      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-15
          - os: macos-26

    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v4

      - name: Configure and Install
        run: |
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=~/.local ..
          cmake --build . --target install


      - name: Test with find_package
        run: |
          export PKG_CONFIG_PATH=~/.local/lib/pkgconfig:$PKG_CONFIG_PATH
          export CPATH=~/.local/include:$CPATH
          
          mkdir ~/standalone_test
          cat > ~/standalone_test/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.10)
          project(StandaloneTest)
          
          find_package(boost_decimal REQUIRED)
          message(STATUS "boost_decimal found: ${boost_decimal_FOUND}")
          
          add_executable(main main.cpp)
          target_link_libraries(main PRIVATE Boost::decimal)
          EOF
          
          cat > ~/standalone_test/main.cpp <<'EOF'
          #include <boost/decimal.hpp>
          #include <iostream>
          int main() {
              using namespace boost::decimal;
              decimal32_t d{456};
              std::cout << "Value: " << d << "\n";
              return 0;
          }
          EOF
          
          cd ~/standalone_test
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=~/.local -DCMAKE_PREFIX_PATH=~/.local ..
          cmake --build .

